serial_bridge:
  ros__parameters:
    serial_port: /dev/ttyACM0
    baudrate: 115200
    startup_silence_sec: 3.0

    meters_per_pulse: 0.0028628686
    poll_period_sec: 0.01

    wheelbase: 0.724
    v_max: 4.44
    max_steer_deg: 24.0
    min_speed: 0.20
    steer_sign: 1.0
    tx_rate_hz: 30.0
    cmd_timeout: 0.5

    cmd_vel_topic: /cmd_vel
